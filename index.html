<div id="ticket-form-modal" class="fixed inset-0 bg-black/90 z-[60] hidden opacity-0 transition-opacity flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-600 p-8 rounded-2xl w-full max-w-4xl shadow-2xl">
            <h2 id="ticket-form-title" class="text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-4">التذكرة</h2><input type="hidden" id="t-id">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-slate-400 text-sm mb-2">الفرع</label>
                    <select id="t-branch" onchange="loadUsersForTicket()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:border-cyan-500">
                        <option value="">-- اختر الفرع --</option>
                        <option value="kitchino">Kitchino</option>
                        <option value="milark">Milark</option>
                        <option value="فرع زايد">فرع زايد</option>
                        <option value="caventa">Caventa</option>
                        <option value="ASSISTO-TROLLY-Katamya">ASSISTO-TROLLY-Katamya</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-400 text-sm mb-2">المستخدم (الموظف)</label>
                    <div class="flex gap-2">
                        <select id="t-user" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:border-cyan-500">
                            <option value="">اختر الفرع أولاً...</option>
                        </select>
                        <button onclick="addNewUserFromTicket()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-4 rounded-lg font-bold transition shadow" title="إضافة موظف جديد"><i class="fa-solid fa-user-plus"></i></button>
                    </div>
                </div>
                <div><label class="block text-slate-400 text-sm mb-2">الحالة</label><select id="t-status" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:border-cyan-500"><option>مفتوحة</option><option>قيد العمل</option><option>مغلق</option></select></div>
                
                <div class="md:col-span-3"><label class="block text-slate-400 text-sm mb-2">المشكلة</label><input type="text" id="t-problem" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:border-cyan-500"></div>
                <div><label class="block text-slate-400 text-sm mb-2">تاريخ التبليغ</label><input type="date" id="t-report" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:border-cyan-500"></div>
                <div><label class="block text-slate-400 text-sm mb-2">تاريخ الحل</label><input type="date" id="t-solve" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:border-cyan-500"></div>
                <div class="md:col-span-3"><label class="block text-slate-400 text-sm mb-2">السبب / الملاحظات (أو تفاصيل الحل)</label><textarea id="t-reason" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:border-cyan-500" rows="2"></textarea></div>
            </div>
            <div class="flex gap-4 mt-8"><button onclick="saveTicket()" id="save-ticket-btn" class="flex-1 bg-red-600 hover:bg-red-500 text-white py-3.5 rounded-xl font-bold transition">حفظ التذكرة</button><button onclick="closeModal('ticket-form-modal')" class="w-40 bg-slate-700 hover:bg-slate-600 text-white py-3.5 rounded-xl font-bold transition">إلغاء</button></div>
        </div>
    </div>
