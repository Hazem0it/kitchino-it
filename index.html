<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الأصول التقنية | ITAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #0f172a);
            color: #f8fafc;
            overflow-x: hidden;
        }
        /* تصميم الزجاج الشفاف */
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            border-radius: 1rem;
        }
        /* تصميم الجدول */
        th { background-color: rgba(15, 23, 42, 0.8); }
        tr { transition: all 0.2s ease; border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr:hover { background-color: rgba(56, 189, 248, 0.05); }
        
        /* الانيميشن */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: #38bdf8;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* تخصيص السكرول بار */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 transition-opacity duration-300 opacity-0 pointer-events-none flex items-center gap-3">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toast-msg">تمت العملية بنجاح</span>
    </div>

    <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">
                إدارة الأصول والعُهد التقنية
            </h1>
            <p class="text-slate-400 mt-2 text-sm"><i class="fa-solid fa-network-wired text-cyan-500 mr-2"></i>نظام تحكم مباشر بقواعد البيانات</p>
        </div>
        <div class="flex items-center gap-4 bg-slate-800/80 px-6 py-3 rounded-full border border-slate-700">
            <div class="text-right">
                <p class="font-bold text-sm text-cyan-400">م. حازم</p>
                <p class="text-xs text-slate-400">IT Administrator</p>
            </div>
            <div class="bg-cyan-500/20 p-2 rounded-full">
                <i class="fa-solid fa-user-tie text-cyan-400"></i>
            </div>
        </div>
    </header>

    <div class="glass-card p-6 mb-8 flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="w-full md:w-1/3">
            <label class="block text-sm font-semibold text-slate-300 mb-2">اختر الفرع (Branch)</label>
            <div class="relative">
                <select id="branch-select" class="w-full bg-slate-800 border border-slate-600 text-white rounded-lg px-4 py-3 appearance-none focus:outline-none focus:border-cyan-500 transition-colors cursor-pointer" onchange="loadBranchData()">
                    <option value="kitchino">فرع Kitchino</option>
                    <option value="milark">فرع Milark</option>
                    <option value="فرع زايد">فرع زايد</option>
                    <option value="caventa">فرع Caventa</option>
                    </select>
                <i class="fa-solid fa-chevron-down absolute left-4 top-4 text-slate-400 pointer-events-none"></i>
            </div>
        </div>

        <div class="flex gap-4 items-center">
            <div id="status-indicator" class="text-sm px-4 py-2 rounded-lg bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 flex items-center gap-2">
                <span class="loader !w-4 !h-4 !border-[2px]"></span> جاري التحميل...
            </div>
            <button onclick="loadBranchData()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg transition-colors border border-slate-600 flex items-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> تحديث
            </button>
        </div>
    </div>

    <div class="glass-card overflow-hidden">
        <div class="overflow-x-auto max-h-[600px]">
            <table class="w-full text-left border-collapse" dir="rtl">
                <thead class="sticky top-0 z-10 shadow-md">
                    <tr>
                        <th class="px-6 py-4 font-semibold text-slate-300">م</th>
                        <th class="px-6 py-4 font-semibold text-slate-300">اسم الموظف</th>
                        <th class="px-6 py-4 font-semibold text-slate-300">سيريال الجهاز (Board Serial)</th>
                        <th class="px-6 py-4 font-semibold text-slate-300">الموديل / المواصفات</th>
                        <th class="px-6 py-4 font-semibold text-slate-300 text-center">الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="text-sm text-slate-400">
                    </tbody>
            </table>
        </div>
        
        <div id="empty-state" class="hidden text-center py-12">
            <i class="fa-solid fa-box-open text-4xl text-slate-600 mb-4"></i>
            <p class="text-slate-400">لا توجد أجهزة مسجلة في هذا الفرع أو جاري التحميل.</p>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-2xl w-full max-w-md shadow-2xl transform scale-95 transition-transform duration-300" id="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white"><i class="fa-solid fa-pen-to-square text-cyan-500 ml-2"></i>تعديل عهدة الجهاز</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-400 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">سيريال الجهاز المستهدف</label>
                    <input type="text" id="edit-serial" disabled class="w-full bg-slate-800/50 border border-slate-700 text-slate-500 rounded-lg px-4 py-2 cursor-not-allowed">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">اسم الموظف الجديد المستلم</label>
                    <input type="text" id="edit-employee" placeholder="أدخل اسم الموظف..." class="w-full bg-slate-800 border border-slate-600 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-500 transition-colors">
                </div>
            </div>

            <div class="mt-8 flex gap-3">
                <button id="save-btn" onclick="saveChanges()" class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2">
                    <i class="fa-solid fa-floppy-disk"></i> حفظ التعديل
                </button>
                <button onclick="closeModal()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-4 rounded-lg transition-colors">
                    إلغاء
                </button>
            </div>
        </div>
    </div>

    <script>
        // رابط الـ API الخاص بك
        const API_URL = 'https://script.google.com/macros/s/AKfycbzq3tV59osnLkLlxidTJd_IKqwt6Z0YuF8CBdabHGqybPeYvPxsRsIq8kpxk0Td-N4UqA/exec';
        
        let currentData = [];

        // دالة إظهار الإشعارات
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            const icon = toast.querySelector('i');
            
            msgEl.innerText = message;
            if (isError) {
                toast.classList.replace('bg-green-500', 'bg-red-500');
                icon.className = 'fa-solid fa-circle-exclamation';
            } else {
                toast.classList.replace('bg-red-500', 'bg-green-500');
                icon.className = 'fa-solid fa-circle-check';
            }
            
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 4000);
        }

        // دالة تغيير حالة مؤشر التحميل
        function setStatus(status) {
            const indicator = document.getElementById('status-indicator');
            if(status === 'loading') {
                indicator.className = 'text-sm px-4 py-2 rounded-lg bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 flex items-center gap-2';
                indicator.innerHTML = '<span class="loader !w-4 !h-4 !border-[2px]"></span> جاري التحميل...';
            } else if (status === 'success') {
                indicator.className = 'text-sm px-4 py-2 rounded-lg bg-green-500/10 text-green-500 border border-green-500/20 flex items-center gap-2';
                indicator.innerHTML = '<i class="fa-solid fa-check"></i> متصل';
            } else {
                indicator.className = 'text-sm px-4 py-2 rounded-lg bg-red-500/10 text-red-500 border border-red-500/20 flex items-center gap-2';
                indicator.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> خطأ بالاتصال';
            }
        }

        // دالة جلب بيانات الفرع
        async function loadBranchData() {
            setStatus('loading');
            const branch = document.getElementById('branch-select').value;
            const tbody = document.getElementById('table-body');
            const emptyState = document.getElementById('empty-state');
            
            tbody.innerHTML = '';
            emptyState.classList.add('hidden');

            try {
                // جلب البيانات مع إرسال اسم الفرع في الرابط
                const response = await fetch(`${API_URL}?sheet=${encodeURIComponent(branch)}`);
                const data = await response.json();
                
                if(data.error) throw new Error(data.error);
                
                currentData = data;
                
                if(data.length === 0) {
                    emptyState.classList.remove('hidden');
                    setStatus('success');
                    return;
                }

                // رسم الجدول
                let html = '';
                data.forEach((row, index) => {
                    // الاعتماد على المسميات الموجودة في ملفاتك
                    const empName = row['اسم الموظف'] || row['User Name'] || '<span class="text-slate-600">غير مسجل</span>';
                    const serial = row['Board Serial Number'] || row['سيريال لاب توب'] || '';
                    const model = row['Model'] || row['مواصفات الجهاز'] || row['Hardware'] || '';
                    
                    // تجاهل الصفوف الفارغة تماماً
                    if(!serial && empName === '<span class="text-slate-600">غير مسجل</span>') return;

                    html += `
                        <tr>
                            <td class="px-6 py-4">${index + 1}</td>
                            <td class="px-6 py-4 font-semibold text-slate-200">
                                <i class="fa-solid fa-user text-slate-500 ml-2 text-xs"></i>${empName}
                            </td>
                            <td class="px-6 py-4 font-mono text-cyan-400">${serial || 'غير متوفر'}</td>
                            <td class="px-6 py-4 text-xs text-slate-400 max-w-xs truncate" title="${model}">${model}</td>
                            <td class="px-6 py-4 text-center">
                                ${serial ? `
                                <button onclick="openModal('${serial}', '${row['اسم الموظف'] || ''}')" class="bg-cyan-500/10 hover:bg-cyan-500/20 text-cyan-400 border border-cyan-500/30 px-4 py-2 rounded-lg text-xs transition-colors">
                                    <i class="fa-solid fa-pen mr-1"></i> تعديل
                                </button>
                                ` : '<span class="text-xs text-slate-600">بدون سيريال</span>'}
                            </td>
                        </tr>
                    `;
                });
                
                tbody.innerHTML = html;
                if(tbody.innerHTML === '') emptyState.classList.remove('hidden');
                
                setStatus('success');
            } catch (error) {
                console.error(error);
                setStatus('error');
                showToast("حدث خطأ في جلب البيانات: " + error.message, true);
            }
        }

        // --- دوال النافذة المنبثقة (Modal) --- //
        
        const modal = document.getElementById('edit-modal');
        const modalContent = document.getElementById('modal-content');
        
        function openModal(serial, currentEmp) {
            document.getElementById('edit-serial').value = serial;
            document.getElementById('edit-employee').value = currentEmp !== 'undefined' ? currentEmp : '';
            
            modal.classList.remove('hidden');
            // تأخير بسيط للانيميشن
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // دالة حفظ التعديلات وإرسالها لجوجل شيتس
        async function saveChanges() {
            const serial = document.getElementById('edit-serial').value;
            const newEmployee = document.getElementById('edit-employee').value;
            const branch = document.getElementById('branch-select').value;
            const btn = document.getElementById('save-btn');
            
            if(!newEmployee.trim()) {
                showToast("الرجاء إدخال اسم الموظف", true);
                return;
            }

            // تغيير شكل الزر لوضع التحميل
            const originalBtnContent = btn.innerHTML;
            btn.innerHTML = '<span class="loader !w-5 !h-5 !border-[2px]"></span> جاري الحفظ...';
            btn.disabled = true;
            btn.classList.add('opacity-70');

            // تجهيز البيانات للإرسال (Payload)
            const payload = {
                action: "update_asset",
                branch: branch,
                serial: serial,
                employee: newEmployee,
                admin: "حازم (IT Admin)" // اسمك كمنفذ للعملية ليتم تسجيله في اللوج
            };

            try {
                // إرسال POST Request إلى الـ API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    // نستخدم text/plain لتجنب مشاكل CORS مع Google Apps Script
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                
                const result = await response.json();
                
                if(result.success) {
                    showToast(result.message || "تم تحديث العهدة بنجاح");
                    closeModal();
                    // إعادة تحميل الجدول ليظهر التعديل الجديد
                    loadBranchData();
                } else {
                    showToast(result.message || "فشل التحديث", true);
                }
            } catch (error) {
                console.error(error);
                showToast("حدث خطأ في الاتصال بالخادم", true);
            } finally {
                // إعادة الزر لشكله الطبيعي
                btn.innerHTML = originalBtnContent;
                btn.disabled = false;
                btn.classList.remove('opacity-70');
            }
        }

        // تحميل البيانات تلقائياً عند فتح الصفحة
        window.onload = loadBranchData;
    </script>
</body>
</html>
